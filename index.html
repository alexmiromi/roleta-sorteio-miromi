<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Roleta de Sorteio</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="Roleta de sorteio de números — Miromi.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roleta Miromi">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #ff4d00;
    --accent2: #ff9500;
    --gold: #ffd700;
    --text: #e8e8f0;
    --muted: #555570;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(255,77,0,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: calc(env(safe-area-inset-top, 0px) + 24px) 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header { text-align: center; }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #c4c4ce 0%, #ffffff 55%, #ffffff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .header p {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* INPUTS */
  .inputs-row { display: flex; gap: 14px; width: 100%; }
  .input-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .input-group label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .input-group input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    text-align: center;
    padding: 10px 8px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .input-group input::-webkit-inner-spin-button,
  .input-group input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .input-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(255,77,0,0.15);
  }

  /* DRUM DISPLAY */
  .drum-wrap { width: 100%; position: relative; }
  .drum-outer {
    width: 100%;
    height: 130px;
    border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    transition: box-shadow 0.2s;
  }
  .drum-outer::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px);
    z-index: 3;
    pointer-events: none;
  }
  .drum-outer::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 52px;
    border-top: 2px solid var(--accent);
    border-bottom: 2px solid var(--accent);
    background: rgba(255,77,0,0.06);
    z-index: 2;
    pointer-events: none;
  }
  .drum-fade { position: absolute; left: 0; right: 0; z-index: 4; pointer-events: none; }
  .drum-fade.top    { top: 0;    height: 40px; background: linear-gradient(to bottom, var(--surface), transparent); }
  .drum-fade.bottom { bottom: 0; height: 40px; background: linear-gradient(to top,   var(--surface), transparent); }
  .drum-track { display: flex; flex-direction: column; align-items: center; position: absolute; left: 0; right: 0; top: 0; }
  .drum-item {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 3px;
    color: var(--muted);
    flex-shrink: 0;
    transition: color 0.1s;
    user-select: none;
  }
  .drum-item.active { color: var(--text); text-shadow: 0 0 20px rgba(255,77,0,0.6); }
  .drum-item.won {
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,200,0,0.85), 0 0 12px rgba(255,120,0,0.6);
    transform: scale(1.14);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.2s, text-shadow 0.2s;
  }

  /* RUFAR DOS TAMBORES */
  @keyframes drumrollShake {
    0%,100% { transform: translate(0,0); }
    20%     { transform: translate(-2px,1px); }
    40%     { transform: translate(2px,-1px); }
    60%     { transform: translate(-1px,-1px); }
    80%     { transform: translate(1px,1px); }
  }
  .drum-wrap.drumroll { animation: drumrollShake 0.07s linear infinite; }
  .drum-wrap.drumroll .drum-outer { box-shadow: 0 0 34px rgba(255,77,0,0.4), inset 0 0 18px rgba(255,77,0,0.08); }

  /* ALAVANCA / MANIVELA */
  .lever {
    position: fixed;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 110px;
    height: 210px;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .lever.show { opacity: 1; }
  .lever-base {
    position: absolute;
    right: 12px; bottom: 70px;
    width: 26px; height: 60px;
    border-radius: 7px;
    background: linear-gradient(#33333f, #14141c);
    border: 1px solid #3a3a48;
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.06);
  }
  .lever-arm {
    position: absolute;
    right: 22px; bottom: 96px;
    width: 10px; height: 86px;
    transform-origin: 50% 100%;
    transform: rotate(-12deg);
  }
  .lever-stick { position: absolute; inset: 0; border-radius: 5px; background: linear-gradient(90deg,#6d6d75,#e8e8ee 45%,#6d6d75); box-shadow: 0 0 4px rgba(0,0,0,0.4); }
  .lever-knob {
    position: absolute;
    left: 50%; top: -16px;
    transform: translateX(-50%);
    width: 34px; height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff8a6a, #e51f1f 55%, #9c0000 100%);
    box-shadow: 0 3px 10px rgba(0,0,0,0.55), inset 0 -3px 6px rgba(0,0,0,0.3);
  }

  /* BUTTON */
  .spin-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(255,77,0,0.3);
  }
  .spin-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0.12), transparent); }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,77,0,0.45); }
  .spin-btn:active:not(:disabled) { transform: translateY(0); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ERROR */
  .error-msg { font-size: 0.75rem; color: #ff4d4d; letter-spacing: 1px; min-height: 16px; text-align: center; }

  /* CONTROLES */
  .controls-row { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .switch {
    display: flex; align-items: center; gap: 9px;
    cursor: pointer; user-select: none;
    font-size: 0.72rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); transition: color 0.2s;
  }
  .switch input { display: none; }
  .switch .track { width: 42px; height: 24px; border-radius: 12px; background: var(--border); position: relative; transition: background 0.2s; flex-shrink: 0; }
  .switch .track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #777; transition: transform 0.2s, background 0.2s; }
  .switch input:checked + .track { background: var(--accent); }
  .switch input:checked + .track::after { transform: translateX(18px); background: #fff; }
  .switch.on { color: var(--text); }
  .reset-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 8px 14px;
    font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: color 0.2s, border-color 0.2s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--accent); }

  /* HISTÓRICO */
  .history { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .history.hidden { display: none; }
  .history-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .history-title { font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .history-all {
    background: transparent; border: none; color: var(--accent2);
    font-size: 0.68rem; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 2px 4px;
  }
  .history-all:hover { color: var(--gold); }
  .history-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 6px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    cursor: pointer; transition: transform 0.12s, border-color 0.2s;
  }
  .chip:hover { border-color: var(--accent); transform: translateY(-1px); }
  .chip:active { transform: translateY(0); }
  .chip.muted { color: var(--muted); border-style: dashed; }
  .chip.last { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border-color: transparent; }

  /* MUTE */
  .mute-btn {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 22px);
    right: calc(env(safe-area-inset-right, 0px) + 14px);
    z-index: 40;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .mute-btn:hover { opacity: 1; }

  /* RESULTADO EM TELA CHEIA */
  .result-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(8,8,12,0.97);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 24px; text-align: center; cursor: pointer;
  }
  .result-overlay.show { display: flex; animation: roFade 0.25s ease; }
  .ro-label { font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); }
  .ro-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(6rem, 42vw, 16rem);
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 40px rgba(255,150,0,0.4));
    animation: roPop 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  .ro-meta { font-size: 0.85rem; color: var(--muted); letter-spacing: 1px; }
  .ro-hint { margin-top: 18px; font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }
  @keyframes roFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes roPop  { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* LISTA "VER TODOS" */
  .list-overlay {
    position: fixed; inset: 0; z-index: 52;
    background: rgba(8,8,12,0.9);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .list-overlay.show { display: flex; animation: roFade 0.2s ease; }
  .list-card {
    width: 100%; max-width: 420px;
    max-height: 80vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .list-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid var(--border);
  }
  .list-head .lh-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; }
  .list-head button {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 6px 12px; font-size: 0.7rem; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .list-head button:hover { border-color: var(--accent); }
  .list-body { overflow-y: auto; padding: 8px 0; }
  .list-row {
    display: flex; align-items: baseline; gap: 12px;
    padding: 9px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .list-row .lr-idx { color: var(--muted); font-size: 0.72rem; min-width: 34px; }
  .list-row .lr-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 1px; color: var(--gold); min-width: 48px; }
  .list-row .lr-time { margin-left: auto; color: var(--muted); font-size: 0.78rem; }

  /* SPARKS */
  .spark { position: fixed; pointer-events: none; border-radius: 50%; animation: sparkFly var(--dur) ease-out forwards; z-index: 51; }
  @keyframes sparkFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* SHAKE */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  .shaking { animation: shake 0.4s ease; }

  /* GLOW PULSE */
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 0 0px rgba(255,77,0,0); }
    50%     { box-shadow: 0 0 40px rgba(255,77,0,0.25), inset 0 0 20px rgba(255,77,0,0.05); }
  }
  .drum-outer.spinning { animation: glowPulse 0.3s ease-in-out infinite; }
</style>
</head>
<body>

<button class="mute-btn" id="muteBtn" onclick="toggleMute()" aria-label="Ligar/desligar som">🔊</button>

<!-- Alavanca de cassino -->
<div class="lever" id="lever" aria-hidden="true">
  <div class="lever-base"></div>
  <div class="lever-arm">
    <div class="lever-stick"></div>
    <div class="lever-knob"></div>
  </div>
</div>

<!-- Resultado em tela cheia -->
<div class="result-overlay" id="resultOverlay" onclick="closeOverlay()">
  <span class="ro-label" id="roLabel">Número sorteado</span>
  <span class="ro-number" id="roNumber">—</span>
  <span class="ro-meta" id="roMeta"></span>
  <span class="ro-hint">toque para fechar</span>
</div>

<!-- Lista "ver todos" -->
<div class="list-overlay" id="listOverlay">
  <div class="list-card">
    <div class="list-head">
      <span class="lh-title" id="listTitle">Sorteados</span>
      <button onclick="closeList()">Fechar</button>
    </div>
    <div class="list-body" id="listBody"></div>
  </div>
</div>

<div class="container">

  <div class="header">
    <h1>MIROMI</h1>
    <p>Roleta</p>
  </div>

  <div class="inputs-row">
    <div class="input-group">
      <label>De</label>
      <input type="number" inputmode="numeric" pattern="[0-9]*" id="minVal" value="1" min="0">
    </div>
    <div class="input-group">
      <label>Até</label>
      <input type="number" inputmode="numeric" pattern="[0-9]*" id="maxVal" value="100" min="0">
    </div>
  </div>

  <div class="drum-wrap" id="drumWrap">
    <div class="drum-outer" id="drumOuter">
      <div class="drum-fade top"></div>
      <div class="drum-fade bottom"></div>
      <div class="drum-track" id="drumTrack"></div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="spin-btn" id="spinBtn" onclick="startSpin()">
    GIRAR
  </button>

  <div class="controls-row">
    <label class="switch" id="noRepeatLabel">
      <input type="checkbox" id="noRepeat" onchange="toggleNoRepeat()">
      <span class="track"></span>
      <span>Não repetir</span>
    </label>
    <button class="reset-btn" id="resetBtn" onclick="resetRound()">Reiniciar</button>
  </div>

  <div class="history hidden" id="history">
    <div class="history-head">
      <span class="history-title" id="historyTitle"></span>
      <button class="history-all" id="historyAll" onclick="openList()">Ver todos</button>
    </div>
    <div class="history-chips" id="historyChips"></div>
  </div>

</div>

<script>
const ITEM_H = 44;
const PADDING = ITEM_H;

let spinning = false;
let muted = false;

/* ---------- Estado persistente (sessão) ----------
   history: lista de { n: número, t: timestamp em ms } na ordem em que saíram */
let history = loadHistory();
let noRepeat = loadFlag('roleta_norepeat');

function loadHistory() {
  try {
    const raw = JSON.parse(localStorage.getItem('roleta_history')) || [];
    // migração: entradas antigas eram só o número
    return raw.map((it) => (it && typeof it === 'object')
      ? { n: it.n, t: it.t || null }
      : { n: it, t: null });
  } catch (e) { return []; }
}
function saveHistory() {
  try { localStorage.setItem('roleta_history', JSON.stringify(history)); } catch (e) {}
}
function loadFlag(key) {
  try { return localStorage.getItem(key) === '1'; } catch (e) { return false; }
}
function fmtTime(ms) {
  if (!ms) return '';
  try {
    return new Date(ms).toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  } catch (e) { return ''; }
}

/* ---------- Aleatoriedade uniforme (crypto) ---------- */
function randInt(n) {
  if (n <= 1) return 0;
  const MAX = 4294967296;
  const limit = MAX - (MAX % n);
  const buf = new Uint32Array(1);
  let x;
  do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= limit);
  return x % n;
}

/* ---------- Áudio ---------- */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playDrumroll(duration) {
  const ctx = ensureAudio();
  if (!ctx || muted) return;
  const now = ctx.currentTime;
  const size = Math.floor(ctx.sampleRate * 0.5);
  const buffer = ctx.createBuffer(1, size, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource();
  noise.buffer = buffer; noise.loop = true;
  const band = ctx.createBiquadFilter();
  band.type = 'bandpass'; band.frequency.value = 190; band.Q.value = 1.1;
  const trem = ctx.createGain(); trem.gain.value = 0.5;
  const lfo = ctx.createOscillator(); lfo.type = 'square';
  lfo.frequency.setValueAtTime(13, now);
  lfo.frequency.linearRampToValueAtTime(34, now + duration);
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.5;
  lfo.connect(lfoGain).connect(trem.gain);
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0001, now);
  master.gain.exponentialRampToValueAtTime(0.45, now + duration * 0.85);
  master.gain.linearRampToValueAtTime(0.55, now + duration);
  noise.connect(band).connect(trem).connect(master).connect(ctx.destination);
  noise.start(now); lfo.start(now);
  noise.stop(now + duration + 0.05); lfo.stop(now + duration + 0.05);
}
function playClunk() {
  const ctx = ensureAudio();
  if (!ctx || muted) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator(); osc.type = 'square';
  osc.frequency.setValueAtTime(150, now);
  osc.frequency.exponentialRampToValueAtTime(45, now + 0.13);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.5, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(g).connect(ctx.destination);
  osc.start(now); osc.stop(now + 0.22);
}
function playWin() {
  const ctx = ensureAudio();
  if (!ctx || muted) return;
  const now = ctx.currentTime;
  const freqs = [523.25, 659.25, 783.99, 1046.5];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = f;
    const g = ctx.createGain();
    const t = now + i * 0.09;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.4, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(g).connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.5);
  });
}
function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
}

/* ---------- Tambor ---------- */
function buildDrum(numbers) {
  const track = document.getElementById('drumTrack');
  track.innerHTML = '';
  numbers.forEach((n, i) => {
    const div = document.createElement('div');
    div.className = 'drum-item';
    div.textContent = n;
    div.dataset.index = i;
    track.appendChild(div);
  });
}
function setActiveIndex(track, idx) {
  track.querySelectorAll('.drum-item').forEach((el, i) => el.classList.toggle('active', i === idx));
}
function easeOut(t) { return 1 - Math.pow(1 - t, 4); }
function wait(ms) { return new Promise((r) => setTimeout(r, ms)); }

/* ---------- Manivela ---------- */
function pullLever() {
  return new Promise((resolve) => {
    const lever = document.getElementById('lever');
    const arm = lever.querySelector('.lever-arm');
    lever.classList.add('show');
    setTimeout(() => {
      const anim = arm.animate([
        { transform: 'rotate(-12deg)' },
        { transform: 'rotate(-108deg)', offset: 0.5 },
        { transform: 'rotate(-92deg)',  offset: 0.62 },
        { transform: 'rotate(-12deg)' }
      ], { duration: 1000, easing: 'ease-in-out' });
      let done = false;
      setTimeout(() => { playClunk(); if (!done) { done = true; resolve(); } }, 520);
      anim.onfinish = () => { lever.classList.remove('show'); };
    }, 240);
  });
}

/* ---------- Rolagem ---------- */
function runReel(min, max, target) {
  return new Promise((resolve) => {
    const n = max - min + 1;
    const spinCount = 40 + randInt(20);
    const spinList = [];
    for (let i = 0; i < spinCount; i++) spinList.push(min + randInt(n));
    spinList.push(target);
    spinList.push(min + randInt(n));

    buildDrum(spinList);

    const track = document.getElementById('drumTrack');
    const drum = document.getElementById('drumOuter');
    const startOffset = PADDING;
    const targetIndex = spinCount;
    const endOffset = -(targetIndex * ITEM_H) + PADDING;

    track.style.transition = 'none';
    track.style.top = `${startOffset}px`;
    setActiveIndex(track, 0);
    drum.classList.add('spinning');

    const duration = 3200 + Math.random() * 800;
    let startTime = null;
    const totalDistance = startOffset - endOffset;

    function tick(ts) {
      if (!startTime) startTime = ts;
      const progress = Math.min((ts - startTime) / duration, 1);
      const eased = easeOut(progress);
      const currentTop = startOffset - totalDistance * eased;
      track.style.top = `${currentTop}px`;
      const centeredIndex = Math.round((PADDING - currentTop) / ITEM_H);
      setActiveIndex(track, Math.max(0, Math.min(spinList.length - 1, centeredIndex)));
      if (progress < 1) {
        requestAnimationFrame(tick);
      } else {
        track.style.top = `${endOffset}px`;
        setActiveIndex(track, targetIndex);
        const items = track.querySelectorAll('.drum-item');
        if (items[targetIndex]) items[targetIndex].classList.add('won');
        drum.classList.remove('spinning');
        fireSparks();
        playWin();
        resolve(target);
      }
    }
    requestAnimationFrame(tick);
  });
}

/* ---------- Sequência completa ---------- */
async function startSpin() {
  if (spinning) return;

  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = '';

  const min = parseInt(document.getElementById('minVal').value);
  const max = parseInt(document.getElementById('maxVal').value);

  if (isNaN(min) || isNaN(max)) { errorEl.textContent = 'Preencha os dois campos.'; return; }
  if (min >= max) {
    errorEl.textContent = 'O valor inicial deve ser menor que o final.';
    document.querySelector('.inputs-row').classList.add('shaking');
    setTimeout(() => document.querySelector('.inputs-row').classList.remove('shaking'), 400);
    return;
  }
  if (max - min > 9999) { errorEl.textContent = 'Intervalo máximo: 10.000 números.'; return; }

  let pool;
  if (noRepeat) {
    const drawnSet = new Set(history.map((h) => h.n));
    pool = [];
    for (let v = min; v <= max; v++) if (!drawnSet.has(v)) pool.push(v);
    if (pool.length === 0) {
      errorEl.textContent = 'Todos os números já saíram. Toque em Reiniciar.';
      return;
    }
  }

  const target = noRepeat ? pool[randInt(pool.length)] : (min + randInt(max - min + 1));

  spinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  ensureAudio();

  const drumWrap = document.getElementById('drumWrap');

  drumWrap.classList.add('drumroll');
  playDrumroll(1.1);
  await wait(1150);
  drumWrap.classList.remove('drumroll');

  await pullLever();
  await runReel(min, max, target);

  const when = Date.now();
  history.push({ n: target, t: when });
  saveHistory();
  renderHistory();
  showOverlay(target, when, false);

  spinning = false;
  btn.disabled = false;
}

/* ---------- Resultado em tela cheia ---------- */
// review=true quando é uma reabertura pelo histórico
function showOverlay(num, ms, review) {
  document.getElementById('roNumber').textContent = num;
  document.getElementById('roLabel').textContent = review ? 'Já sorteado' : 'Número sorteado';
  const meta = fmtTime(ms);
  document.getElementById('roMeta').textContent = review
    ? (meta ? 'saiu em ' + meta : 'horário não registrado')
    : meta;
  document.getElementById('resultOverlay').classList.add('show');
}
function closeOverlay() {
  document.getElementById('resultOverlay').classList.remove('show');
}

/* ---------- Histórico ---------- */
function renderHistory() {
  const wrap = document.getElementById('history');
  const chipsEl = document.getElementById('historyChips');
  const titleEl = document.getElementById('historyTitle');
  if (!history.length) { wrap.classList.add('hidden'); chipsEl.innerHTML = ''; return; }
  wrap.classList.remove('hidden');
  titleEl.textContent = `Já saíram (${history.length}) · toque para rever`;
  const MAXCHIPS = 24;
  const start = Math.max(0, history.length - MAXCHIPS);
  const shown = history.slice(start);
  chipsEl.innerHTML = '';
  if (start > 0) {
    const more = document.createElement('span');
    more.className = 'chip muted';
    more.textContent = `+${start}`;
    more.addEventListener('click', openList);
    chipsEl.appendChild(more);
  }
  shown.forEach((entry, i) => {
    const c = document.createElement('span');
    c.className = 'chip' + (i === shown.length - 1 ? ' last' : '');
    c.textContent = entry.n;
    c.addEventListener('click', () => { if (!spinning) showOverlay(entry.n, entry.t, true); });
    chipsEl.appendChild(c);
  });
}

/* ---------- Lista "ver todos" ---------- */
function openList() {
  const body = document.getElementById('listBody');
  document.getElementById('listTitle').textContent = `Sorteados (${history.length})`;
  body.innerHTML = '';
  history.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'list-row';
    const idx = document.createElement('span'); idx.className = 'lr-idx'; idx.textContent = '#' + (i + 1);
    const num = document.createElement('span'); num.className = 'lr-num'; num.textContent = entry.n;
    const time = document.createElement('span'); time.className = 'lr-time'; time.textContent = fmtTime(entry.t) || '—';
    row.appendChild(idx); row.appendChild(num); row.appendChild(time);
    body.appendChild(row);
  });
  document.getElementById('listOverlay').classList.add('show');
}
function closeList() {
  document.getElementById('listOverlay').classList.remove('show');
}

/* ---------- Controles ---------- */
function toggleNoRepeat() {
  noRepeat = document.getElementById('noRepeat').checked;
  document.getElementById('noRepeatLabel').classList.toggle('on', noRepeat);
  try { localStorage.setItem('roleta_norepeat', noRepeat ? '1' : '0'); } catch (e) {}
}
function resetRound() {
  if (history.length && !confirm('Reiniciar a rodada? Isso apaga os números já sorteados.')) return;
  history = [];
  saveHistory();
  renderHistory();
  document.getElementById('errorMsg').textContent = '';
}

function fireSparks() {
  const colors = ['#ff4d00','#ff9500','#ffd700','#fff','#ff6a00'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.5;
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    const size = 4 + Math.random() * 8;
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 180;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 60;
    const dur = 0.5 + Math.random() * 0.6;
    el.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      width: ${size}px; height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      --tx: ${tx}px; --ty: ${ty}px; --dur: ${dur}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 100);
  }
}

/* ---------- Inicialização ---------- */
['minVal', 'maxVal'].forEach((id) => {
  const el = document.getElementById(id);
  el.addEventListener('focus', () => setTimeout(() => el.select(), 0));
});

// Fecha a lista ao tocar fora do card
document.getElementById('listOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('listOverlay')) closeList();
});

document.getElementById('noRepeat').checked = noRepeat;
document.getElementById('noRepeatLabel').classList.toggle('on', noRepeat);
renderHistory();

buildDrum([1, 2, 3, 4, 5]);
document.getElementById('drumTrack').style.top = `${PADDING}px`;
document.querySelector('.drum-item').classList.add('active');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => console.warn('SW falhou:', err));
  });
}
</script>
