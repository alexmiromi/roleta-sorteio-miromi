<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d00"/>
      <stop offset="55%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- wheel segments -->
    <g>
      <circle r="150" fill="#13131a" stroke="url(#rim)" stroke-width="14"/>
      <!-- 8 alternating slices -->
      <g>
        <path d="M0 0 L150 0 A150 150 0 0 1 106 106 Z" fill="#ff4d00"/>
        <path d="M0 0 L0 150 A150 150 0 0 1 -106 106 Z" fill="#ff4d00"/>
        <path d="M0 0 L-150 0 A150 150 0 0 1 -106 -106 Z" fill="#ff4d00"/>
        <path d="M0 0 L0 -150 A150 150 0 0 1 106 -106 Z" fill="#ff4d00"/>
        <path d="M0 0 L106 106 A150 150 0 0 1 0 150 Z" fill="#ff9500"/>
        <path d="M0 0 L-106 106 A150 150 0 0 1 -150 0 Z" fill="#ff9500"/>
        <path d="M0 0 L-106 -106 A150 150 0 0 1 0 -150 Z" fill="#ff9500"/>
        <path d="M0 0 L106 -106 A150 150 0 0 1 150 0 Z" fill="#ff9500"/>
      </g>
      <circle r="150" fill="none" stroke="url(#rim)" stroke-width="14"/>
      <circle r="34" fill="#0a0a0f" stroke="#ffd700" stroke-width="6"/>
    </g>
    <!-- pointer at top -->
    <path d="M0 -188 L22 -150 L-22 -150 Z" fill="#ffd700"/>
  </g>
</svg>
